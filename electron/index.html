<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OGQ Docs Ask</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- 헤더 -->
    <header class="app-header">
      <div class="header-content">
        <div>
          <h1>📋 OGQ Docs Ask</h1>
          <p class="subtitle">OGQ 문서 검색 및 요약 도구</p>
        </div>
        <div class="header-right">
          <div id="indexStatus" class="index-status">
            <span class="status-loading">인덱스 확인 중...</span>
          </div>
          <button id="settingsButton" class="settings-button" title="설정">
            ⚙️ 설정
          </button>
        </div>
      </div>
    </header>

    <!-- 질문 입력 영역 -->
    <div class="question-area">
      <div class="input-group">
        <div class="input-wrapper">
          <input
            type="text"
            id="questionInput"
            class="question-input"
            placeholder="질문을 입력하세요 (예: KT 계약 종료 언제야?)"
            autocomplete="off"
          />
          <button id="clearInputButton" class="clear-input-button" title="입력 내용 지우기" style="display: none;">
            ✕
          </button>
        </div>
        <button id="askButton" class="ask-button">
          <span id="buttonText">질문하기</span>
          <span id="buttonSpinner" class="spinner" style="display: none;">⏳</span>
        </button>
        <button id="resetButton" class="reset-button" title="전체 초기화">
          🔄 초기화
        </button>
      </div>

      <!-- 예시 질문 버튼 -->
      <div id="exampleQuestions" class="example-questions">
        <p class="example-label">예시 질문:</p>
        <div class="example-buttons">
          <button class="example-btn" data-question="KT 계약 종료 언제야?">
            KT 계약 종료 언제야?
          </button>
          <button class="example-btn" data-question="이번달 청구 총액 얼마야?">
            이번달 청구 총액 얼마야?
          </button>
          <button class="example-btn" data-question="SKT 계약서 어디 있어?">
            SKT 계약서 어디 있어?
          </button>
          <button class="example-btn" data-question="채팅+마켓 운영비용 견적서에서 SKT 관련 내용 뭐야?">
            채팅+마켓 운영비용 견적서에서 SKT 관련 내용 뭐야?
          </button>
          <button class="example-btn" data-question="비즈챗 단가 얼마야?">
            비즈챗 단가 얼마야?
          </button>
        </div>
      </div>
    </div>

    <!-- 초기 설정 영역 (인덱스가 없을 때만 표시) -->
    <div id="initialSetup" class="initial-setup" style="display: none;">
      <div class="setup-card">
        <h2>⚙️ 초기 설정</h2>
        <p class="setup-description">처음 사용하는 환경에서는 문서 폴더를 한 번만 지정하면 됩니다.</p>

        <div class="setup-field">
          <label>📁 문서 폴더</label>
          <div id="initialFoldersList" class="folder-list">
            <!-- 동적으로 추가됨 -->
          </div>
          <button id="initialAddFolderButton" class="action-button secondary">
            ➕ 폴더 추가
          </button>
        </div>

        <div class="setup-field">
          <label class="checkbox-label">
            <input type="checkbox" id="watchDownloadsCheckbox" checked />
            <span>💾 다운로드 폴더 자동 감시</span>
          </label>
        </div>

        <div class="setup-field">
          <label class="checkbox-label">
            <input type="checkbox" id="watchGoogleDriveCheckbox" checked />
            <span>☁️ Google Drive 폴더 자동 감시</span>
          </label>
        </div>

        <div class="setup-actions">
          <button id="saveSetupButton" class="save-setup-button" disabled>
            💾 설정 저장
          </button>
          <button id="saveAndIndexButton" class="save-and-index-button" disabled>
            📚 저장 후 인덱스 생성
          </button>
        </div>

        <div id="setupMessage" class="setup-message" style="display: none;"></div>
      </div>
    </div>

    <!-- 결과 영역 -->
    <div class="result-area">
      <div id="resultContent" class="result-content">
        <div class="welcome-message">
          <h2>👋 환영합니다!</h2>
          <p>위에서 질문을 선택하거나 직접 입력하여 시작하세요.</p>
          <div class="features">
            <div class="feature-item">
              <div class="feature-icon">🔍</div>
              <div class="feature-text">문서 검색</div>
            </div>
            <div class="feature-item">
              <div class="feature-icon">📅</div>
              <div class="feature-text">일정 조회</div>
            </div>
            <div class="feature-item">
              <div class="feature-icon">💰</div>
              <div class="feature-text">금액 분석</div>
            </div>
            <div class="feature-item">
              <div class="feature-icon">📄</div>
              <div class="feature-text">내용 질문</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 자동 인덱싱 상태바 -->
  <div id="auto-index-status-bar" style="display: none; position: fixed; bottom: 20px; right: 20px; background: rgba(0, 0, 0, 0.8); color: white; padding: 10px 15px; border-radius: 8px; font-size: 12px; z-index: 10000;">
    <span id="auto-index-status-text">자동 인덱싱 대기 중...</span>
  </div>

  <!-- 설정 모달 -->
  <div id="settingsModal" class="settings-modal" style="display: none;">
    <div class="settings-modal-overlay"></div>
    <div class="settings-modal-content">
      <div class="settings-header">
        <h2>⚙️ 설정</h2>
        <button id="closeSettingsButton" class="close-settings-button">✕</button>
      </div>

      <div class="settings-body">
        <!-- 인덱스 정보 -->
        <div class="settings-section">
          <h3>📊 인덱스 정보</h3>
          <div class="index-info-grid">
            <div class="info-item">
              <span class="info-label">문서 수:</span>
              <span id="settingsDocCount" class="info-value">-</span>
            </div>
            <div class="info-item">
              <span class="info-label">마지막 인덱싱:</span>
              <span id="settingsLastIndexed" class="info-value">-</span>
            </div>
          </div>
          <button id="reindexButton" class="action-button secondary">
            🔄 인덱스 재생성
          </button>
        </div>

        <!-- 문서 폴더 설정 -->
        <div class="settings-section">
          <h3>📁 문서 폴더</h3>
          <div id="documentFoldersList" class="folder-list">
            <!-- 동적으로 추가됨 -->
          </div>
          <button id="addFolderButton" class="action-button secondary">
            ➕ 폴더 추가
          </button>
        </div>

        <!-- 감시 옵션 -->
        <div class="settings-section">
          <h3>👁️ 자동 감시</h3>
          <label class="checkbox-label">
            <input type="checkbox" id="settingsWatchDownloads" />
            <span>💾 Downloads 폴더 자동 감시</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="settingsWatchGoogleDrive" />
            <span>☁️ Google Drive 폴더 자동 감시</span>
          </label>
        </div>

        <!-- 저장 버튼 -->
        <div class="settings-actions">
          <button id="saveSettingsButton" class="action-button primary">
            💾 저장
          </button>
          <button id="saveAndReindexButton" class="action-button primary">
            📚 저장 후 인덱스 재생성
          </button>
        </div>

        <div id="settingsMessage" class="settings-message" style="display: none;"></div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
